services:
  db:
    image: mysql:8.0
    container_name: sakila-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
    ports:
      - "3306:3306"
    volumes:
      - sakila-db-data:/var/lib/mysql
    networks:
      - sakila-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    mem_limit: 512m

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sakila-app
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DB: ${MYSQL_DB}
      SECRET_KEY: ${SECRET_KEY}
      CONNECTION_TIMEOUT: ${CONNECTION_TIMEOUT}
      HEALTH_CHECK_INTERVAL: ${HEALTH_CHECK_INTERVAL}
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sakila-network
    restart: on-failure:5

  db-admin:
    image: adminer:latest
    container_name: sakila-adminer
    environment:
      ADMINER_DEFAULT_SERVER: db
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sakila-network

  test-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sakila-test-runner
    command: python -m pytest tests/ -v
    environment:
      MYSQL_HOST: db
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DB: ${MYSQL_DB}
      SECRET_KEY: ${SECRET_KEY}
      CONNECTION_TIMEOUT: ${CONNECTION_TIMEOUT}
      HEALTH_CHECK_INTERVAL: ${HEALTH_CHECK_INTERVAL}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - sakila-network
    profiles:
      - test

networks:
  sakila-network:
    driver: bridge

volumes:
  sakila-db-data:
