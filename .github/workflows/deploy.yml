name: Deployment Workflow

on:
  push:
    branches: [main]
    paths:
      - "app.py"
      - "config.py"
      - "templates/**"
      - "static/**"
      - "Dockerfile"
      - "requirements.txt"
      - "docker-compose.yml"

env:
  IMAGE_NAME: sakila-app

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Simulate staging deployment
        run: |
          echo "Environment: staging"
          echo "Image: ${IMAGE_NAME}:staging-${GITHUB_SHA::7}"
          echo "Staging deployment completed."
      - name: Deployment summary
        run: |
          echo "## Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: $GITHUB_SHA" >> $GITHUB_STEP_SUMMARY
          echo "- Image Tag: ${IMAGE_NAME}:staging-${GITHUB_SHA::7}" >> $GITHUB_STEP_SUMMARY
      - name: Notification
        run: echo "Slack notification: Deployment to staging successful"

  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Simulate production deployment
        run: |
          VERSION_TAG="v$(date +'%Y.%m.%d')"
          echo "Deploying production release ${VERSION_TAG}"
      - name: Create release tag
        id: release_meta
        run: echo "version_tag=v$(date +'%Y.%m.%d')" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.version_tag }}
          name: ${{ steps.release_meta.outputs.version_tag }}
          body: Automated release from deploy workflow.
      - name: Notification
        run: echo "Slack notification: Deployment to production successful"
